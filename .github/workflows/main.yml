name: CF IP Auto Update (Top 5 per Country - Fixed)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v5

    - name: Daily Reset Check
      id: reset
      run: |
        H=$(date -u +"%H")
        if [ "$H" = "00" ]; then echo "reset=true" >> $GITHUB_OUTPUT; else echo "reset=false" >> $GITHUB_OUTPUT; fi

    - name: Fetch / Best Port / Top 5 per Country
      run: |
        set -e
        mkdir -p data

        LIST_URL="https://ip.164746.xyz/"
        TRACE_HOST="cs.891122.xyz"
        OUT="data/ipapi.txt"
        FC="data/_failcount.txt"
        PORTS=(443 2053 2083 2087 2096 8443)
        touch "$FC"

        if [ "${{ steps.reset.outputs.reset }}" = "true" ]; then
          echo "🌅 每日首次(UTC 00:00)：清空"
          > "$OUT"
          > "$FC"
        fi

        # ==========================================================
        # A. 存量 IP：重新评估最优端口 + 延迟
        # ==========================================================
        if [ -s "$OUT" ]; then
          echo "🩺 存量 IP 重选最优端口..."
          TMP_KEEP=""
          while IFS= read -r line; do
            ip=$(echo "$line" | grep -oE '^([0-9]{1,3}\.){3}[0-9]{1,3}')
            [ -z "$ip" ] && { TMP_KEEP="${TMP_KEEP}${line}"$'\n'; continue; }

            best_port=""
            best_time=999

            for port in "${PORTS[@]}"; do
              start=$(date +%s%3N)
              resp=$(curl -sk --connect-timeout 3 --max-time 6 \
                --resolve "$TRACE_HOST:$port:$ip" \
                "https://$TRACE_HOST:$port/cdn-cgi/trace" 2>/dev/null)
              if echo "$resp" | grep -qi '^colo='; then
                end=$(date +%s%3N)
                rt=$((end-start))
                if [ "$rt" -lt "$best_time" ]; then
                  best_time=$rt
                  best_port=$port
                fi
              fi
            done

            if [ -z "$best_port" ]; then
              old=$(awk -v i="$ip" '$1==i{print $2}' "$FC" || true)
              old=${old:-0}
              new=$((old+1))
              echo "  ❌ $ip 所有端口失效 (连续 $new/3)"
              if [ "$new" -ge 3 ]; then
                echo "  🗑  剔除 $ip"
                awk -v i="$ip" '$1!=i' "$FC" > /tmp/_fc.txt && mv /tmp/_fc.txt "$FC"
                continue
              else
                grep -v "^$ip " "$FC" > /tmp/_fc.txt
                echo "$ip $new" >> /tmp/_fc.txt
                mv /tmp/_fc.txt "$FC"
                continue
              fi
            fi

            awk -v i="$ip" '$1!=i' "$FC" > /tmp/_fc.txt && mv /tmp/_fc.txt "$FC"

            # 提取国家（兼容多种格式）
            country=$(echo "$line" | sed -E 's/.*#//' | sed 's/([0-9]*ms)//g')
            TMP_KEEP="${TMP_KEEP}${ip}:${best_port}#${country}#${best_time}"$'\n'
            echo "  ✅ $ip 最优端口：$best_port (${best_time}ms)"
          done <<< "$(cat "$OUT")"

          printf '%s' "$TMP_KEEP" | grep -xE '.+' > /tmp/out_clean.txt
          mv /tmp/out_clean.txt "$OUT"
          echo "✅ 存量重选完成"
        fi

        # ==========================================================
        # B. 新 IP：最优端口 + 双重归属查询
        # ==========================================================
        echo "📡 抓取新 IP：$LIST_URL"
        curl -s --connect-timeout 15 --max-time 30 "$LIST_URL" \
        | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' \
        | sort -u > /tmp/latest_ips.txt

        echo "📋 本轮候选 IP 数：$(wc -l < /tmp/latest_ips.txt)"

        touch "$OUT"
        grep -oE '^([0-9]{1,3}\.){3}[0-9]{1,3}' "$OUT" | sort -u > /tmp/existing_ips.txt

        NEW=0
        while read ip; do
          [ -z "$ip" ] && continue
          if grep -qx "$ip" /tmp/existing_ips.txt; then
            echo "  ⏭ $ip 已存在"
            continue
          fi

          best_port=""
          best_time=999

          for port in "${PORTS[@]}"; do
            start=$(date +%s%3N)
            resp=$(curl -sk --connect-timeout 3 --max-time 6 \
              --resolve "$TRACE_HOST:$port:$ip" \
              "https://$TRACE_HOST:$port/cdn-cgi/trace" 2>/dev/null)
            if echo "$resp" | grep -qi '^colo='; then
              end=$(date +%s%3N)
              rt=$((end-start))
              if [ "$rt" -lt "$best_time" ]; then
                best_time=$rt
                best_port=$port
              fi
            fi
          done

          if [ -z "$best_port" ]; then
            echo "  ⚠️  $ip 所有端口不可用，跳过"
            continue
          fi

          echo "  🆕 归属查询：$ip"
          
          # 双重归属查询
          COUNTRY=""
          COUNTRY=$(curl -s --connect-timeout 8 --max-time 10 "https://iplark.com/?q=$ip" \
            | grep -oE '国家[:：]\s*[^\s<]+' | head -1 | sed -E 's/国家[:：]\s*//' | tr -d ' ')
          
          if [ -z "$COUNTRY" ] || [ "$COUNTRY" = "未知地区" ]; then
            COUNTRY=$(curl -s --connect-timeout 8 --max-time 10 "http://ip-api.com/json/$ip?fields=country" \
              | grep -oE '"country":"[^"]+"' | cut -d'"' -f4)
          fi
          
          if [ -z "$COUNTRY" ]; then
            COUNTRY=$(curl -s --connect-timeout 8 --max-time 10 "https://ipwhois.app/json/$ip" \
              | grep -oE '"country":"[^"]+"' | cut -d'"' -f4)
          fi
          
          COUNTRY=${COUNTRY:-未知地区}
          
          # 清理国家名称
          case "$COUNTRY" in
            "China") COUNTRY="中国" ;;
            "Hong Kong") COUNTRY="中国香港" ;;
            "Taiwan") COUNTRY="中国台湾" ;;
            "Macau") COUNTRY="中国澳门" ;;
            "United States") COUNTRY="美国" ;;
            "Japan") COUNTRY="日本" ;;
            "South Korea") COUNTRY="韩国" ;;
            "Singapore") COUNTRY="新加坡" ;;
            "Germany") COUNTRY="德国" ;;
            "France") COUNTRY="法国" ;;
            "United Kingdom") COUNTRY="英国" ;;
          esac

          echo "$ip:${best_port}#${COUNTRY}#${best_time}" >> "$OUT"
          echo "$ip" >> /tmp/existing_ips.txt
          NEW=$((NEW+1))
          echo "     → 选定端口 ${best_port} (${best_time}ms) | 归属：$COUNTRY"
          sleep 1
        done < /tmp/latest_ips.txt

        echo "✏️  追加新 IP：$NEW"

        # ==========================================================
        # C. 每个国家只保留延迟最低的前 5 个（修复版）
        # ==========================================================
        echo "🎯 每个国家只保留延迟最低的前 5 个..."
        
        # 创建临时文件
        > /tmp/top5_per_country.txt
        
        # 动态获取所有国家（从现有数据中）
        countries=$(grep -oE '#[^#]+#[0-9]+$' "$OUT" | sed -E 's/#([^#]+)#[0-9]+$/\1/' | sort -u)
        
        echo "📊 发现国家：$countries"
        
        # 对每个国家取前5个
        for country in $countries; do
          echo "  处理国家：$country"
          grep "#${country}#" "$OUT" | sort -t'#' -k3 -n | head -5 >> /tmp/top5_per_country.txt
        done
        
        # 如果文件不为空，替换原文件
        if [ -s /tmp/top5_per_country.txt ]; then
          mv /tmp/top5_per_country.txt "$OUT"
        fi

        # ==========================================================
        # D. 最终排序 + 清理格式（去掉延迟）
        # ==========================================================
        echo "🧮 最终排序..."
        
        # 按国家优先级排序
        (
          grep -E '#(中国|中国香港|中国台湾|中国澳门)#' "$OUT" | sort -t'#' -k3 -n
          grep -E '#美国#' "$OUT" | sort -t'#' -k3 -n
          grep -E '#日本#' "$OUT" | sort -t'#' -k3 -n
          grep -E '#韩国#' "$OUT" | sort -t'#' -k3 -n
          grep -E '#新加坡#' "$OUT" | sort -t'#' -k3 -n
          grep -E '#(德国|法国|英国)#' "$OUT" | sort -t'#' -k3 -n
          grep -v -E '#(中国|中国香港|中国台湾|中国澳门|美国|日本|韩国|新加坡|德国|法国|英国)#' "$OUT" | sort -t'#' -k3 -n
        ) > /tmp/ipapi_sorted.txt

        # ✅ 清理格式：去掉延迟部分
        sed -E 's/#([^#]+)#[0-9]+$/#\1/' /tmp/ipapi_sorted.txt > "$OUT"

        echo "📦 最终 IP 数：$(grep -c '^[0-9]' "$OUT")"

    - name: Commit & Push
      run: |
        git config user.name "cf-bot"
        git config user.email "bot@localhost"
        git add data/
        git diff --cached --quiet || git commit -m "auto: update ipapi.txt"
        git push
