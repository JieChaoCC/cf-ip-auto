name: CF IP Daily Update

on:
  schedule:
    - cron: '0 0,8,16 * * *'   # UTC 0/8/16 ≈ 北京 8/16/24 点
  workflow_dispatch:           # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Fetch & Parse IP
      run: |
        mkdir -p data

        # 获取 IP
        curl -s --connect-timeout 10 --max-time 20 https://ip.164746.xyz/ \
        | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' \
        | sort -u > data/latest_ips.txt

        # 历史去重
        touch data/all_ips.txt
        cat data/all_ips.txt data/latest_ips.txt \
        | sort -u > data/tmp_ips.txt && mv data/tmp_ips.txt data/all_ips.txt

        # 生成 addressesapi.txt
        echo "# Updated: $(date '+%Y-%m-%d %H:%M:%S UTC')" > data/addressesapi.txt
        echo "# Source: https://ip.164746.xyz/" >> data/addressesapi.txt
        echo "" >> data/addressesapi.txt

        while read ip; do
          echo "$ip:443#CF" >> data/addressesapi.txt
        done < data/all_ips.txt

    - name: Commit & Push
      run: |
        git config user.name "cf-bot"
        git config user.email "bot@localhost"
        git add data/
        git diff --cached --quiet || git commit -m "auto: update cf ip list"
        git push
